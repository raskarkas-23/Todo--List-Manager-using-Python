<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #121212; color: white; }
.table { background: rgb(234, 199, 199); }
th, td { color: rgb(13, 13, 13) !important; }
</style>

</head>

<body class="p-4">

<h2>Admin Dashboard</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Task</th>
<th>Status</th>
<th>Due Date</th>
<th>Priority</th>
<th>Assigned User</th>
</tr>
</thead>

<tbody>

{% for t in tasks %}
<tr>
<td>{{ t[0] }}</td>
<td>{{ t[1] }}</td>
<td>{{ t[2] }}</td>
<td>{{ t[3] }}</td>
<td>{{ t[4] }}</td>

<td>
{% if t[6] %}
{{ t[6] }} (ID: {{ t[5] }})
{% else %}
Not Assigned
{% endif %}
</td>

</tr>
{% endfor %}

</tbody>
</table>

<a href="/" class="btn btn-primary mt-3">Back</a>

</body>
</html>
