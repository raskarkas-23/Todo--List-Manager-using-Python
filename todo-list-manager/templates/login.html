<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    background: #ff7e5f;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="card">
<h2>Login</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

<p><a href="/signup">Create account</a></p>
</div>

</body>
</html>
