<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body {
    background: linear-gradient(135deg, #43cea2, #185a9d);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    background: #43cea2;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="card">
<h2>Signup</h2>

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="email" placeholder="Email" required>
<input name="password" type="password" placeholder="Password" required>
<button>Signup</button>
</form>

<p><a href="/login">Login</a></p>
</div>

</body>
</html>
