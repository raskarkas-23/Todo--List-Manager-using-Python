<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Dashboard</h2>

<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById('chart'), {
type:'pie',
data:{
labels:['Completed','Pending'],
datasets:[{
data:[{{completed}},{{pending}}]
}]
}
});
</script>

<a href="/">Back</a>

</body>
</html>
